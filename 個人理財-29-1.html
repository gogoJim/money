		// 新增：綁定可編輯預算金額的雙擊事件
attachEditableBudgetEvents() {
    const editableSpans = document.querySelectorAll('.editable-budget-limit');
    
    editableSpans.forEach(span => {
        // 移除舊的監聽器（避免重複綁定）
        span.removeEventListener('dblclick', this._handleBudgetDblClick);
        span.removeEventListener('blur', this._handleBudgetBlur);
        span.removeEventListener('keypress', this._handleBudgetKeyPress);
        
        // 儲存事件處理器的引用，以便後續移除
        this._handleBudgetDblClick = (e) => {
            e.stopPropagation();
            const element = e.currentTarget;
            const category = element.dataset.category;
            const currentLimit = parseFloat(element.dataset.originalLimit);
            
            if (element.classList.contains('editing')) return;
            
            // 創建輸入框
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentLimit;
            input.step = '0.01';
            input.min = '0';
            input.className = 'budget-limit-input';
            input.style.width = element.offsetWidth + 'px';
            
            // 替換內容
            const originalText = element.textContent;
            element.textContent = '';
            element.appendChild(input);
            element.classList.add('editing');
            
            input.focus();
            input.select();
            
            // 儲存完成後恢復的函數
            const finishEditing = (saveChanges = true) => {
                if (!saveChanges) {
                    element.textContent = originalText;
                    element.classList.remove('editing');
                    return;
                }
                
                let newLimit = parseFloat(input.value);
                if (isNaN(newLimit) || newLimit <= 0) {
                    alert('請輸入有效的預算金額（大於0）');
                    element.textContent = originalText;
                    element.classList.remove('editing');
                    return;
                }
                
                newLimit = Math.round(newLimit * 100) / 100;
                
                // 更新預算
                if (AppState.updateBudget(category, newLimit)) {
                    DB.save().then(() => {
                        element.dataset.originalLimit = newLimit;
                        element.textContent = Utils.formatMoney(newLimit);
                        element.classList.remove('editing');
                        // 重新整理預算列表以更新圖表
                        this.renderBudgetList();
                        Utils.showToast(`「${category}」預算已更新為 ${Utils.formatMoney(newLimit)}`);
                    }).catch(error => {
                        showError('更新預算失敗');
                        element.textContent = originalText;
                        element.classList.remove('editing');
                    });
                } else {
                    alert('更新預算失敗');
                    element.textContent = originalText;
                    element.classList.remove('editing');
                }
            };
            
            // 綁定事件
            const handleBlur = () => finishEditing(true);
            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    finishEditing(true);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    finishEditing(false);
                }
            };
            
            input.addEventListener('blur', handleBlur);
            input.addEventListener('keypress', handleKeyPress);
            
            // 儲存事件處理器以便清理（可選）
            element._blurHandler = handleBlur;
            element._keypressHandler = handleKeyPress;
        };
        
        span.addEventListener('dblclick', this._handleBudgetDblClick);
    });
},

        };
    }
    
    if (rule && AppState.addRecurringRule(rule)) { 
        DB.save().then(() => { 
            this.renderRecurringList(); 
            descriptionInput.value = ''; 
            amountInput.value = ''; 
            this.setDefaultDate(); 
            // 重置類型為支出
            if (typeSelect) typeSelect.value = 'expense';
            this.toggleRecurringFields('expense');
            Utils.showToast('定期交易規則已新增'); 
        }).catch(error => { showError('新增規則失敗'); }); 
    } else alert('新增規則失敗'); 
},

	// 儲存編輯後的定期規則
async saveEditRecurringRule(ruleId, editPanel) {
    const descInput = editPanel.querySelector('#editRecurringDesc');
    const amountInput = editPanel.querySelector('#editRecurringAmount');
    const typeSelect = editPanel.querySelector('#editRecurringType');
    const frequencySelect = editPanel.querySelector('#editRecurringFrequency');
    const dateInput = editPanel.querySelector('#editRecurringNextDate');
    
    const description = descInput ? descInput.value.trim() : '';
    const amount = parseFloat(amountInput?.value || 0);
    const type = typeSelect?.value || 'expense';
    const frequency = frequencySelect?.value || 'monthly';
    const nextDate = dateInput?.value || '';
    
    // 驗證基本欄位
    if (!description) {
        alert('請輸入交易說明');
        return;
    }
    if (isNaN(amount) || amount <= 0) {
        alert('請輸入有效的金額（大於0）');
        return;
    }
    if (!nextDate || !Utils.isValidDate(nextDate)) {
        alert('請設定有效的下次執行日期');
        return;
    }
    
    // 找到原始規則
    const rules = AppState.getRecurringRules();
    const ruleIndex = rules.findIndex(r => r.id === ruleId);
    if (ruleIndex === -1) {
        alert('找不到該定期規則');
        editPanel.remove();
        return;
    }
    
    let updatedRule = {};
    
    if (type === 'transfer') {
        // 轉帳類型：取得來源和目標帳戶
        const fromSelect = editPanel.querySelector('#editRecurringFromAccount');
        const toSelect = editPanel.querySelector('#editRecurringToAccount');
        const fromAccountId = fromSelect?.value || '';
        const toAccountId = toSelect?.value || '';
        
        if (!fromAccountId || !toAccountId) {
            alert('請選擇來源與目標帳戶');
            return;
        }
        if (fromAccountId === toAccountId) {
            alert('來源和目標帳戶不能相同');
            return;
        }
        
        updatedRule = {
            ...rules[ruleIndex],
            description: description,
            amount: Math.round(amount * 100) / 100,
            type: 'transfer',
            fromAccountId: fromAccountId,
            toAccountId: toAccountId,
            frequency: frequency,
            category: 'transfer',
            nextDate: nextDate,
            active: true
        };
    } else {
        // 支出/收入類型：取得帳戶和分類
        const accountSelect = editPanel.querySelector('#editRecurringAccount');
        const categorySelect = editPanel.querySelector('#editRecurringCategory');
        const accountId = accountSelect?.value || '';
        const category = categorySelect?.value || '';
        
        if (!accountId) {
            alert('請選擇帳戶');
            return;
        }
        if (!category) {
            alert('請選擇分類');
            return;
        }
        
        updatedRule = {
            ...rules[ruleIndex],
            description: description,
            amount: Math.round(amount * 100) / 100,
            type: type,
            accountId: accountId,
            frequency: frequency,
            category: category,
            nextDate: nextDate,
            active: true
        };
    }
    
    rules[ruleIndex] = updatedRule;
    AppState.setRecurringRules(rules);
    
    try {
        await DB.save();
        Utils.showToast('定期規則已更新');
        editPanel.remove();
        this.renderRecurringList();
    } catch (error) {
        showError('儲存失敗');
    }
},

toggleCalculator() {
    const existingPanel = document.getElementById('calculatorPanel');
    if (existingPanel) {
        existingPanel.remove();
        return;
    }
    
    const panel = document.createElement('div');
    panel.id = 'calculatorPanel';
    panel.className = 'calculator-panel';
    panel.innerHTML = `
        <div class="calculator-header">
            <span>🧮 計算機</span>
            <button id="closeCalculatorBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; font-size:20px; cursor:pointer; width:32px; height:32px; border-radius:40px; display:flex; align-items:center; justify-content:center;">&times;</button>
        </div>
        <div class="calculator-display" id="calcDisplay">0</div>
        <div class="calculator-buttons">
            <button class="calc-btn clear" data-value="clear">C</button>
            <button class="calc-btn" data-value="(">(</button>
            <button class="calc-btn" data-value=")">)</button>
            <button class="calc-btn operator" data-value="/">÷</button>
            
            <button class="calc-btn" data-value="7">7</button>
            <button class="calc-btn" data-value="8">8</button>
            <button class="calc-btn" data-value="9">9</button>
            <button class="calc-btn operator" data-value="*">×</button>
            
            <button class="calc-btn" data-value="4">4</button>
            <button class="calc-btn" data-value="5">5</button>
            <button class="calc-btn" data-value="6">6</button>
            <button class="calc-btn operator" data-value="-">-</button>
            
            <button class="calc-btn" data-value="1">1</button>
            <button class="calc-btn" data-value="2">2</button>
            <button class="calc-btn" data-value="3">3</button>
            <button class="calc-btn operator" data-value="+">+</button>
            
            <button class="calc-btn" data-value="0">0</button>
            <button class="calc-btn" data-value=".">.</button>
            <button class="calc-btn equals" data-value="=">=</button>
            <button class="calc-btn operator" data-value="%">%</button>
        </div>
        <div style="padding:8px 16px; background:#f8fafc; font-size:11px; color:#6e8ea6; text-align:center; border-top:1px solid #e2edf6;">
            ⌨️ 鍵盤支援：數字、+-*/. Enter計算 Esc關閉
        </div>
    `;
    
    document.body.appendChild(panel);
    
    const closeBtn = document.getElementById('closeCalculatorBtn');
    if (closeBtn) {
        closeBtn.addEventListener('click', () => panel.remove());
    }
    
    panel.addEventListener('click', (e) => {
        if (e.target === panel) panel.remove();
    });
    
    this.initCalculatorEvents();
},

initCalculatorEvents() {
    const display = document.getElementById('calcDisplay');
    if (!display) return;
    
    let currentExpression = '';
    
    const updateDisplay = () => {
        display.textContent = currentExpression || '0';
    };
    
    const calculate = () => {
        if (!currentExpression) return;
        try {
            let expr = currentExpression.replace(/×/g, '*').replace(/÷/g, '/');
            const result = Function('"use strict";return (' + expr + ')')();
            if (isNaN(result) || !isFinite(result)) {
                throw new Error('無效計算');
            }
            const finalResult = Math.round(result * 1000000) / 1000000;
            currentExpression = String(finalResult);
            updateDisplay();
        } catch (error) {
            display.textContent = '❌ 錯誤';
            setTimeout(() => {
                currentExpression = '';
                updateDisplay();
            }, 800);
        }
    };
    
    const handleButtonClick = (value) => {
        if (value === 'clear') {
            currentExpression = '';
            updateDisplay();
        } else if (value === '=') {
            calculate();
        } else {
            currentExpression += value;
            updateDisplay();
        }
    };
    
    const buttons = document.querySelectorAll('#calculatorPanel .calc-btn');
    buttons.forEach(btn => {
        btn.removeEventListener('click', this._calcHandler);
        this._calcHandler = () => {
            const val = btn.dataset.value;
            if (val) handleButtonClick(val);
        };
        btn.addEventListener('click', this._calcHandler);
    });
    
    if (this._calcKeyboardHandler) {
        document.removeEventListener('keydown', this._calcKeyboardHandler);
    }
    this._calcKeyboardHandler = (e) => {
        const key = e.key;
        const panel = document.getElementById('calculatorPanel');
        if (!panel) {
            document.removeEventListener('keydown', this._calcKeyboardHandler);
            return;
        }
        
        if (key === 'Escape') {
            panel.remove();
            return;
        }
        
        if (key === 'Enter') {
            e.preventDefault();
            calculate();
            return;
        }
        
        if (/^[0-9]$/.test(key)) {
            handleButtonClick(key);
        } else if (key === '+' || key === '-' || key === '*' || key === '/') {
            let symbol = key;
            if (key === '*') symbol = '×';
            if (key === '/') symbol = '÷';
            handleButtonClick(symbol);
        } else if (key === '.') {
            handleButtonClick('.');
        } else if (key === '%') {
            handleButtonClick('%');
        } else if (key === '(' || key === ')') {
            handleButtonClick(key);
        } else if (key === 'c' || key === 'C') {
            handleButtonClick('clear');
        }
    };
    document.addEventListener('keydown', this._calcKeyboardHandler);
}

function validateAndRepairData() { const transactions = AppState.getTransactions(); const accounts = AppState.getAccounts(); const recurringRules = AppState.getRecurringRules(); let repairsMade = false; for (let i = transactions.length - 1; i >= 0; i--) { const transaction = transactions[i]; if (!transaction.date || !Utils.isValidDate(transaction.date)) { transaction.date = new Date().toISOString().slice(0, 10); repairsMade = true; } if (typeof transaction.amount !== 'number' || isNaN(transaction.amount) || transaction.amount <= 0) { transaction.amount = 0; repairsMade = true; } if (!['expense', 'income', 'transfer'].includes(transaction.type)) { transaction.type = 'expense'; repairsMade = true; } if (transaction.type !== 'transfer') { if (!accounts.some(a => a.id === transaction.accountId)) { transactions.splice(i, 1); repairsMade = true; } } else { if (!accounts.some(a => a.id === transaction.fromAccountId) || !accounts.some(a => a.id === transaction.toAccountId)) { transactions.splice(i, 1); repairsMade = true; } } } 
for (let i = recurringRules.length - 1; i >= 0; i--) {
    const rule = recurringRules[i];
    let isValidAccount = true;
    
    if (rule.type === 'transfer') {
        const fromExists = accounts.some(a => a.id === rule.fromAccountId);
        const toExists = accounts.some(a => a.id === rule.toAccountId);
        isValidAccount = fromExists && toExists;
    } else {
        isValidAccount = accounts.some(a => a.id === rule.accountId);
    }
    
    if (!isValidAccount) {
        console.warn(`無效的定期規則已刪除: ${rule.description}`);
        recurringRules.splice(i, 1);
        repairsMade = true;
        continue;
    }
    
    if (!rule.nextDate || !Utils.isValidDate(rule.nextDate)) {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        rule.nextDate = tomorrow.toISOString().slice(0, 10);
        repairsMade = true;
    }
}

 
 if (repairsMade) 
 { AppState.setTransactions(transactions);
 AppState.setRecurringRules(recurringRules);
 DB.save().catch(error => console.error('儲存修復資料失敗:', error)); } }

    importBackupFromFile(file) {

        if (!file || !file.name.endsWith('.json')) {
            reject(new Error('請選擇正確的 JSON 備份檔案'));
            return;
        }
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const backup = JSON.parse(event.target.result);
                if (!backup.data || !backup.data.accounts || !backup.data.transactions) {
                    reject(new Error('無效的備份檔案格式'));
                    return;
                }
                
                // ✅ 新增：處理備份檔案中的使用者名稱
                const importedUserName = backup.userName || backup.data?.userName || '';
                const currentUserName = UserProfile.getCurrentUserName();
                
                if (importedUserName && importedUserName !== currentUserName) {
                    const userConfirmed = confirm(
                        `📋 備份檔案的使用者名稱：${importedUserName}\n` +
                        `👤 目前的使用者名稱：${currentUserName || '(未設定)'}\n\n` +
                        `是否要將使用者名稱變更為「${importedUserName}」？`
                    );
                    if (userConfirmed) {
                        UserProfile.setUserName(importedUserName);
                        UserProfile.updateUI();
                    }
                }
                
                if (confirm(`確定要匯入這份備份嗎？\n備份時間：${backup.timestamp}\n交易筆數：${backup.stats?.transactionCount || backup.data.transactions.length}\n目前所有資料將會被覆蓋！`)) {
                    showLoading('匯入備份中...');
                    await this.createBackup('匯入前自動備份');
                    AppState.setAccounts(backup.data.accounts || []);
                    AppState.setTransactions(backup.data.transactions || []);
                    AppState.setBudgets(backup.data.budgets || {});
                    AppState.setCategoryStructure(backup.data.categoryStructure || {});
                    AppState.setRecurringRules(backup.data.recurringRules || []);
					    // ✅ 清理無效的定期規則（使用共用函數）
					const cleanedRules = DataValidator.sanitizeRecurringRules(
					AppState.getRecurringRules(),
					AppState.getAccounts()
					);
					AppState.setRecurringRules(cleanedRules);
					
                    await DB.save();
                    UIRenderer.refreshAll();
                    hideLoading();
                    Utils.showToast('✅ 備份匯入成功！');
                    resolve();
                } else {
                    reject(new Error('使用者取消'));
                }
            } catch (error) {
                reject(new Error('解析備份檔案失敗：' + error.message));
            }
        };
        reader.onerror = () => reject(new Error('讀取檔案失敗'));
        reader.readAsText(file);
    });
},

style="padding:10px; text-align:center;">操作</th></tr></thead><tbody>${backups.map(backup => `<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px;">${new Date(backup.timestamp).toLocaleString()}</td><td style="padding:10px;">${Utils.escapeHtml(backup.reason)}</td><td style="padding:10px; text-align:center;">${backup.stats.transactionCount}</td><td style="padding:10px; text-align:center;"><button class="restore-backup-btn" data-id="${backup.id}" style="background:#2a7f49; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer; margin-right:6px;">還原</button><button class="export-backup-btn" data-id="${backup.id}" style="background:#6c757d; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer; margin-right:6px;">匯出</button><button class="delete-backup-btn" data-id="${backup.id}" style="background:#c23d3d; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">刪除</button></td></tr>`).join('')}</tbody><table>`}</div><div style="padding:16px; border-top:1px solid #e2e8f0; background:#f8fafc; font-size:12px; color:#666;">💡 提示：瀏覽器清除資料會刪除所有備份，建議定期「匯出」備份到電腦保存</div>`; document.body.appendChild(panel); document.getElementById('closeBackupPanelBtn').onclick = () => panel.remove(); document.getElementById('createBackupNowBtn').onclick = async () => { await this.createBackup('手動備份'); this.showBackupPanel(); }; const fileInput = document.getElementById('backupFileInput'); document.getElementById('importBackupFileBtn').onclick = () => fileInput.click(); fileInput.onchange = async (e) => { if (e.target.files[0]) { try { await this.importBackupFromFile(e.target.files[0]); this.showBackupPanel(); } catch(error) { alert(error.message); } fileInput.value = ''; } }; document.querySelectorAll('.restore-backup-btn').forEach(btn => { btn.onclick = async () => { await this.restoreBackup(parseInt(btn.dataset.id)); this.showBackupPanel(); }; }); document.querySelectorAll('.export-backup-btn').forEach(btn // ======================== 🆕 財務規劃模組（獨立擴充） ========================
// 功能：1.未來現金流預測圖表  2.儲蓄目標設定與追蹤  3.儲蓄率計算與趨勢分析
// 完全不影響原有程式碼

(function() {
    'use strict';
    
    // ==================== 私有變數 ====================
    let planningPanel = null;
    let savingsGoal = null;
    let _trendChart = null;      // 改名避免衝突
    let _forecastChart = null;   // 新增：儲存預測圖表實例
    
    // ==================== 讀取資料（唯讀） ====================
    function getFinancialData() {
        return {
            accounts: AppState.getAccounts(),
            transactions: AppState.getTransactions(),
            budgets: AppState.getBudgets(),
            recurringRules: AppState.getRecurringRules()
        };
    }
    
    // 載入/儲存目標設定
    function loadGoalFromStorage() {
        const saved = localStorage.getItem('wealth_planning_goal');
        if (saved) {
            try {
                savingsGoal = JSON.parse(saved);
            } catch(e) {}
        }
        if (!savingsGoal) {
            savingsGoal = {
                targetAmount: 100000,
                currentSaved: 0,
                goalName: '緊急預備金',
                targetDate: new Date(new Date().getFullYear() + 1, new Date().getMonth(), 1).toISOString().slice(0, 10)
            };
        }
        return savingsGoal;
    }
    
    function saveGoalToStorage() {
        localStorage.setItem('wealth_planning_goal', JSON.stringify(savingsGoal));
    }
    
    // ==================== 1. 儲蓄率計算與趨勢分析 ====================
    function calculateSavingsRateHistory(months = 12) {
        const data = getFinancialData();
        const transactions = data.transactions;
        const history = [];
        const now = new Date();
        
        for (let i = months - 1; i >= 0; i--) {
            const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const yearMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            const monthName = `${date.getFullYear()}/${date.getMonth() + 1}`;
            
            let income = 0, expense = 0;
            for (const tx of transactions) {
                if (tx.date && tx.date.startsWith(yearMonth)) {
                    if (tx.type === 'income') income += tx.amount;
                    if (tx.type === 'expense') expense += tx.amount;
                }
            }
            
            const savings = income - expense;
            const savingsRate = income > 0 ? (savings / income * 100) : 0;
            
            history.push({
                yearMonth,
                monthName,
                income,
                expense,
                savings,
                savingsRate: Math.round(savingsRate * 10) / 10
            });
        }
        
        const avgSavingsRate = history.reduce((sum, m) => sum + m.savingsRate, 0) / (history.length || 1);
        const totalIncome = history.reduce((sum, m) => sum + m.income, 0);
        const totalExpense = history.reduce((sum, m) => sum + m.expense, 0);
        
        return {
            history,
            avgSavingsRate: Math.round(avgSavingsRate * 10) / 10,
            totalIncome,
            totalExpense,
            totalSavings: totalIncome - totalExpense
        };
    }
    
    // ==================== 2. 未來現金流預測 ====================
    function forecastCashFlow(months = 6) {
        const data = getFinancialData();
        const accounts = data.accounts;
        const recurringRules = data.recurringRules;
        
        let currentBalance = 0;
        for (const acc of accounts) {
            const balance = FinanceLogic.computeAccountBalance(acc.id);
            if (acc.type === 'asset') currentBalance += balance;
            else currentBalance -= balance;
        }
        
        const avgVariableExpense = calculateAvgVariableExpense();
        const forecast = [];
        let runningBalance = currentBalance;
        const today = new Date();
        
        for (let i = 1; i <= months; i++) {
            const targetDate = new Date(today.getFullYear(), today.getMonth() + i, 1);
            const monthName = `${targetDate.getFullYear()}/${targetDate.getMonth() + 1}`;
            
            let monthIncome = 0, monthExpense = 0;
            
            for (const rule of recurringRules) {
                if (rule.active === false) continue;
                
                if (rule.type === 'income') {
                    if (isRuleActiveInMonth(rule, targetDate)) monthIncome += rule.amount;
                } else if (rule.type === 'expense') {
                    if (isRuleActiveInMonth(rule, targetDate)) monthExpense += rule.amount;
                }
            }
            
            monthExpense += avgVariableExpense;
            runningBalance = runningBalance + monthIncome - monthExpense;
            
            forecast.push({
                monthName,
                income: monthIncome,
                expense: monthExpense,
                variableExpense: avgVariableExpense,
                netFlow: monthIncome - monthExpense,
                balance: runningBalance
            });
        }
        return forecast;
    }
    
    function calculateAvgVariableExpense() {
        const data = getFinancialData();
        const transactions = data.transactions;
        const recurringRules = data.recurringRules;
        
        const now = new Date();
        let totalVariableExpense = 0;
        let monthCount = 0;
        
        for (let i = 1; i <= 3; i++) {
            const targetDate = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const yearMonth = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, '0')}`;
            
            let monthlyFixedExpense = 0;
            let monthlyTotalExpense = 0;
            
            for (const rule of recurringRules) {
                if (rule.type === 'expense' && rule.active !== false) {
                    if (isRuleActiveInMonth(rule, targetDate)) monthlyFixedExpense += rule.amount;
                }
            }
            
            for (const tx of transactions) {
                if (tx.type === 'expense' && tx.date && tx.date.startsWith(yearMonth)) {
                    monthlyTotalExpense += tx.amount;
                }
            }
            
            const variableExpense = Math.max(0, monthlyTotalExpense - monthlyFixedExpense);
            totalVariableExpense += variableExpense;
            monthCount++;
        }
        return monthCount > 0 ? Math.round(totalVariableExpense / monthCount) : 5000;
    }
    
    function isRuleActiveInMonth(rule, targetDate) {
        const ruleDate = new Date(rule.nextDate);
        const ruleYear = ruleDate.getFullYear();
        const ruleMonth = ruleDate.getMonth();
        const targetYear = targetDate.getFullYear();
        const targetMonth = targetDate.getMonth();
        
        if (rule.frequency === 'monthly') {
            return ruleYear === targetYear && ruleMonth === targetMonth;
        } else if (rule.frequency === 'yearly') {
            return ruleMonth === targetMonth;
        } else if (rule.frequency === 'weekly') {
            const daysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const checkDate = new Date(targetYear, targetMonth, d);
                const daysDiff = Math.floor((checkDate - ruleDate) / (1000 * 60 * 60 * 24));
                if (daysDiff >= 0 && daysDiff % 7 === 0) return true;
            }
            return false;
        }
        return false;
    }
    
    function calculateCurrentSavings() {
        const accounts = AppState.getAccounts();
        let total = 0;
        for (const acc of accounts) {
            const balance = FinanceLogic.computeAccountBalance(acc.id);
            if (acc.type === 'asset') total += balance;
            else total -= balance;
        }
        return Math.max(0, total);
    }
    
    // ==================== 3. 儲蓄目標達成進度 ====================
    function calculateGoalProgress() {
        const currentSaved = calculateCurrentSavings();
        savingsGoal.currentSaved = currentSaved;
        saveGoalToStorage();
        
        const targetAmount = savingsGoal.targetAmount;
        const progress = Math.min(100, (currentSaved / targetAmount) * 100);
        const remaining = Math.max(0, targetAmount - currentSaved);
        
        const today = new Date();
        const targetDate = new Date(savingsGoal.targetDate);
        const monthsLeft = Math.max(1, (targetDate.getFullYear() - today.getFullYear()) * 12 + (targetDate.getMonth() - today.getMonth()));
        const monthlyNeeded = remaining / monthsLeft;
        
        const savingsHistory = calculateSavingsRateHistory(3);
        const currentMonthlySavings = savingsHistory.totalSavings / 3;
        
        return {
            currentSaved,
            targetAmount,
            progress: Math.round(progress * 10) / 10,
            remaining,
            monthsLeft,
            monthlyNeeded,
            currentMonthlySavings,
            isOnTrack: currentMonthlySavings >= monthlyNeeded,
            goalName: savingsGoal.goalName,
            targetDate: savingsGoal.targetDate
        };
    }
    
    // ==================== 建立圖表（修正版） ====================
    function destroyTrendChart() {
        if (_trendChart) {
            _trendChart.destroy();
            _trendChart = null;
        }
    }
    
    function destroyForecastChart() {
        if (_forecastChart) {
            _forecastChart.destroy();
            _forecastChart = null;
        }
    }

    }
    
function renderForecastChart(canvasId, forecast) {
    // 注意：呼叫時會傳入 'planningForecastChartCanvas'
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        destroyForecastChart();
        
        const labels = forecast.map(m => m.monthName);
        const balances = forecast.map(m => m.balance);
        const netFlows = forecast.map(m => m.netFlow);
        
        _forecastChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '預估餘額',
                        data: balances,
                        type: 'line',
                        borderColor: '#2f8bb3',
                        backgroundColor: 'rgba(47, 139, 179, 0.05)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#2f8bb3',
                        pointBorderColor: '#fff',
                        pointRadius: 5,
                        yAxisID: 'y'
                    },
                    {
                        label: '當月淨現金流',
                        data: netFlows,
                        backgroundColor: netFlows.map(v => v >= 0 ? '#2a7f49' : '#cd5b5b'),
                        borderRadius: 6,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                let value = context.parsed.y;
                                return `${label}: ${Utils.formatMoney(value)}`;
                            }
                        }
                    },
                    legend: { position: 'bottom' }
                },
                scales: {
                    y: {
                        position: 'left',
                        title: { display: true, text: '預估餘額', color: '#2f8bb3' },
                        ticks: { callback: (v) => Utils.formatMoney(v) }
                    },
                    y1: {
                        position: 'right',
                        title: { display: true, text: '當月淨現金流', color: '#2a7f49' },
                        ticks: { callback: (v) => Utils.formatMoney(v) },
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });
    }
    
    // ==================== 主面板 UI ====================
    function createPlanningPanel() {
        if (planningPanel) {
            planningPanel.remove();
            planningPanel = null;
        }
        
        loadGoalFromStorage();
        const savingsHistory = calculateSavingsRateHistory(12);
        const forecast = forecastCashFlow(6);
        const goalProgress = calculateGoalProgress();
        
        const panel = document.createElement('div');
        panel.id = 'planningPanel';
        panel.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            max-width: 95vw;
            max-height: 85vh;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 10001;
            overflow: auto;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        `;
        
        panel.innerHTML = `
            <div style="background: linear-gradient(135deg, #1a2c3b, #0f212f); color: white; padding: 20px 24px; border-radius: 32px 32px 0 0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;">
                <h3 style="margin: 0;">📈 財務規劃室</h3>
                <div>
                    <button id="refreshPlanningBtn" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 30px; margin-right: 12px; cursor: pointer;">🔄 重新整理</button>
                    <button id="closePlanningBtn" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
                </div>
            </div>
            <div style="padding: 24px;">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;">
                    <div style="background: linear-gradient(135deg, #e8f5e9, #c8e6d9); border-radius: 20px; padding: 16px;">
                        <div style="font-size: 13px; color: #2e7d32;">📊 平均儲蓄率</div>
                        <div style="font-size: 32px; font-weight: 800; color: #2e7d32;">${savingsHistory.avgSavingsRate}%</div>
                        <div style="font-size: 11px; color: #558b2f;">近12個月平均</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #e3f2fd, #bbdef5); border-radius: 20px; padding: 16px;">
                        <div style="font-size: 13px; color: #1565c0;">💰 總資產淨值</div>
                        <div style="font-size: 32px; font-weight: 800; color: #1565c0;">${Utils.formatMoney(goalProgress.currentSaved)}</div>
                        <div style="font-size: 11px; color: #1976d2;">當前總資產 - 負債</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #fff3e0, #ffe0b2); border-radius: 20px; padding: 16px;">
                        <div style="font-size: 13px; color: #e65100;">🎯 目標達成進度</div>
                        <div style="font-size: 32px; font-weight: 800; color: #e65100;">${goalProgress.progress}%</div>
                        <div style="font-size: 11px; color: #ef6c00;">${savingsGoal.goalName} ${Utils.formatMoney(goalProgress.targetAmount)}</div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 8px; border-bottom: 2px solid #e2edf6; margin-bottom: 20px;">
                    <button class="planning-tab-btn active" data-tab="trend" style="background: none; border: none; padding: 10px 20px; font-weight: 600; color: #1f6d96; border-bottom: 3px solid #1f6d96; cursor: pointer;">📈 儲蓄率趨勢</button>
                    <button class="planning-tab-btn" data-tab="forecast" style="background: none; border: none; padding: 10px 20px; font-weight: 600; color: #6e8ea6; cursor: pointer;">🔮 現金流預測</button>
                    <button class="planning-tab-btn" data-tab="goal" style="background: none; border: none; padding: 10px 20px; font-weight: 600; color: #6e8ea6; cursor: pointer;">🎯 儲蓄目標追蹤</button>
                </div>
                
                <div id="trendTab" class="planning-tab-content" style="display: block;">
                    <div style="height: 320px; margin-bottom: 20px;">
                        <canvas id="planningTrendChartCanvas"></canvas>   <!-- ✅ 新 ID -->
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px;">
                        <div style="background: #f8fafc; border-radius: 16px; padding: 12px; text-align: center;">
                            <div style="font-size: 12px; color: #6e8ea6;">總收入</div>
                            <div style="font-size: 20px; font-weight: 700; color: #2a7f49;">${Utils.formatMoney(savingsHistory.totalIncome)}</div>
                        </div>
                        <div style="background: #f8fafc; border-radius: 16px; padding: 12px; text-align: center;">
                            <div style="font-size: 12px; color: #6e8ea6;">總支出</div>
                            <div style="font-size: 20px; font-weight: 700; color: #cd5b5b;">${Utils.formatMoney(savingsHistory.totalExpense)}</div>
                        </div>
                        <div style="background: #f8fafc; border-radius: 16px; padding: 12px; text-align: center;">
                            <div style="font-size: 12px; color: #6e8ea6;">總儲蓄</div>
                            <div style="font-size: 20px; font-weight: 700; color: #2f8bb3;">${Utils.formatMoney(savingsHistory.totalSavings)}</div>
                        </div>
                    </div>
                    <div style="margin-top: 16px; font-size: 12px; color: #6e8ea6; text-align: center; padding: 8px; background: #f0f7fc; border-radius: 16px;">
                        💡 儲蓄率 = (收入 - 支出) / 收入 × 100% | ${savingsHistory.avgSavingsRate >= 30 ? '🎉 儲蓄率優良，財務狀況健康！' : savingsHistory.avgSavingsRate >= 20 ? '👍 儲蓄率良好，繼續保持！' : '⚠️ 儲蓄率偏低，建議檢視非必要支出'}
                    </div>
                </div>
                
                <div id="forecastTab" class="planning-tab-content" style="display: none;">
                    <div style="height: 320px; margin-bottom: 20px;">
                        <canvas id="planningForecastChartCanvas"></canvas> <!-- ✅ 新 ID -->
                    </div>
                    <div style="overflow-x: auto; margin-top: 16px;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                            <thead>
                                <tr style="background: #f8fafc;">
                                    <th style="padding: 10px; text-align: left;">月份</th>
                                    <th style="padding: 10px; text-align: right;">預估收入</th>
                                    <th style="padding: 10px; text-align: right;">固定支出</th>
                                    <th style="padding: 10px; text-align: right;">變動支出</th>
                                    <th style="padding: 10px; text-align: right;">淨現金流</th>
                                    <th style="padding: 10px; text-align: right;">累積餘額</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${forecast.map(m => `
                                    <tr style="border-bottom: 1px solid #e2edf6;">
                                        <td style="padding: 10px;">${m.monthName}</td>
                                        <td style="padding: 10px; text-align: right; color: #2a7f49;">${Utils.formatMoney(m.income)}</td>
                                        <td style="padding: 10px; text-align: right;">${Utils.formatMoney(m.expense - m.variableExpense)}</td>
                                        <td style="padding: 10px; text-align: right; color: #c97e5a;">${Utils.formatMoney(m.variableExpense)}</td>
                                        <td style="padding: 10px; text-align: right; ${m.netFlow >= 0 ? 'color: #2a7f49;' : 'color: #cd5b5b;'}">${Utils.formatMoney(m.netFlow)}</td>
                                        <td style="padding: 10px; text-align: right; font-weight: 600; ${m.balance >= 0 ? 'color: #2f8bb3;' : 'color: #cd5b5b;'}">${Utils.formatMoney(m.balance)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div style="margin-top: 16px; font-size: 12px; color: #6e8ea6; text-align: center; padding: 8px; background: #f0f7fc; border-radius: 16px;">
                        💡 預測基於定期規則 + 過去3個月平均變動支出 | 變動支出預估: ${Utils.formatMoney(forecast[0]?.variableExpense || 0)}/月
                    </div>
                </div>
                
                <div id="goalTab" class="planning-tab-content" style="display: none;">
                    <div style="background: #f8fafc; border-radius: 24px; padding: 20px; margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px;">
                            <div>
                                <div style="font-size: 12px; color: #6e8ea6;">目標名稱</div>
                                <div style="font-size: 18px; font-weight: 700;">${Utils.escapeHtml(savingsGoal.goalName)}</div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #6e8ea6;">目標金額</div>
                                <div style="font-size: 18px; font-weight: 700;">${Utils.formatMoney(savingsGoal.targetAmount)}</div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #6e8ea6;">目標日期</div>
                                <div style="font-size: 18px; font-weight: 700;">${savingsGoal.targetDate}</div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #6e8ea6;">已儲蓄金額</div>
                                <div style="font-size: 18px; font-weight: 700; color: #2a7f49;">${Utils.formatMoney(goalProgress.currentSaved)}</div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 16px;">
                            <div class="progress-bar" style="background: #e2eaf1; border-radius: 20px; height: 24px; overflow: hidden;">
                                <div class="progress-fill" style="width: ${Math.min(goalProgress.progress, 100)}%; background: linear-gradient(90deg, #2f8bb3, #2a7f49); height: 100%; border-radius: 20px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 12px; font-weight: 600;">${goalProgress.progress}%</div>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 20px;">
                            <div style="background: white; border-radius: 16px; padding: 12px;">
                                <div style="font-size: 12px; color: #6e8ea6;">距離目標</div>
                                <div style="font-size: 20px; font-weight: 700;">${Utils.formatMoney(goalProgress.remaining)}</div>
                            </div>
                            <div style="background: white; border-radius: 16px; padding: 12px;">
                                <div style="font-size: 12px; color: #6e8ea6;">剩餘時間</div>
                                <div style="font-size: 20px; font-weight: 700;">${goalProgress.monthsLeft} 個月</div>
                            </div>
                            <div style="background: white; border-radius: 16px; padding: 12px;">
                                <div style="font-size: 12px; color: #6e8ea6;">每月需存</div>
                                <div style="font-size: 20px; font-weight: 700; ${goalProgress.isOnTrack ? 'color: #2a7f49;' : 'color: #cd5b5b;'}">${Utils.formatMoney(goalProgress.monthlyNeeded)}</div>
                            </div>
                            <div style="background: white; border-radius: 16px; padding: 12px;">
                                <div style="font-size: 12px; color: #6e8ea6;">目前每月儲蓄</div>
                                <div style="font-size: 20px; font-weight: 700;">${Utils.formatMoney(goalProgress.currentMonthlySavings)}</div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 16px; padding: 12px; border-radius: 16px; background: ${goalProgress.isOnTrack ? '#e8f5e9' : '#ffebee'};">
                            <div style="font-size: 13px; font-weight: 500;">
                                ${goalProgress.isOnTrack 
                                    ? `✅ 進度良好！目前每月儲蓄 ${Utils.formatMoney(goalProgress.currentMonthlySavings)} 超過目標所需 ${Utils.formatMoney(goalProgress.monthlyNeeded)}，可提前達成目標！` 
                                    : `⚠️ 目前每月儲蓄 ${Utils.formatMoney(goalProgress.currentMonthlySavings)} 低於目標所需 ${Utils.formatMoney(goalProgress.monthlyNeeded)}，建議提高儲蓄率或調整目標`}
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="editGoalBtn" style="background: #2f8bb3; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer;">✏️ 編輯目標</button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.appendChild(panel);
        planningPanel = panel;
        
		renderTrendChart('planningTrendChartCanvas', savingsHistory.history);
		renderForecastChart('planningForecastChartCanvas', forecast);
        
        document.getElementById('closePlanningBtn')?.addEventListener('click', () => {
            destroyTrendChart();
            destroyForecastChart();
            panel.remove();
            planningPanel = null;
        });
        
        document.getElementById('refreshPlanningBtn')?.addEventListener('click', () => {
            panel.remove();
            planningPanel = null;
            createPlanningPanel();
        });
        
        document.getElementById('editGoalBtn')?.addEventListener('click', () => showGoalSettingDialog());
        
        document.querySelectorAll('.planning-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.planning-tab-btn').forEach(b => {
                    b.classList.remove('active');
                    b.style.color = '#6e8ea6';
                    b.style.borderBottom = 'none';
                });
                btn.classList.add('active');
                btn.style.color = '#1f6d96';
                btn.style.borderBottom = '3px solid #1f6d96';
                
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.planning-tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`${tabId}Tab`).style.display = 'block';
                
			setTimeout(() => {
				if (tabId === 'trend') {
				const newHistory = calculateSavingsRateHistory(12);
				renderTrendChart('planningTrendChartCanvas', newHistory.history);
				} else if (tabId === 'forecast') {
				const newForecast = forecastCashFlow(6);
				renderForecastChart('planningForecastChartCanvas', newForecast);
				}
				}, 100);
            });
        });
        
        panel.addEventListener('click', (e) => {
            if (e.target === panel) {
                destroyTrendChart();
                destroyForecastChart();
                panel.remove();
                planningPanel = null;
            }
        });
    }
    
    // ==================== 編輯目標對話框 ====================
    function showGoalSettingDialog() {
        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10002;
        `;
        
        modal.innerHTML = `
            <div style="background: white; border-radius: 32px; width: 400px; max-width: 90%; padding: 28px;">
                <h3 style="margin: 0 0 20px 0; color: #1e4663;">🎯 設定儲蓄目標</h3>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">目標名稱</label>
                    <input type="text" id="goalNameInput" value="${Utils.escapeHtml(savingsGoal.goalName)}" style="width: 100%; padding: 10px; border-radius: 40px; border: 1px solid #cde0ed;">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">目標金額</label>
                    <input type="number" id="goalAmountInput" value="${savingsGoal.targetAmount}" step="1000" style="width: 100%; padding: 10px; border-radius: 40px; border: 1px solid #cde0ed;">
                </div>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">目標達成日期</label>
                    <input type="date" id="goalDateInput" value="${savingsGoal.targetDate}" style="width: 100%; padding: 10px; border-radius: 40px; border: 1px solid #cde0ed;">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button id="cancelGoalBtn" style="background: #eef3fc; border: 1px solid #cde0ed; padding: 10px 20px; border-radius: 40px; cursor: pointer;">取消</button>
                    <button id="saveGoalBtn" style="background: linear-gradient(135deg, #2f8bb3, #1f6d96); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer;">儲存目標</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        document.getElementById('cancelGoalBtn')?.addEventListener('click', () => modal.remove());
        document.getElementById('saveGoalBtn')?.addEventListener('click', () => {
            const newName = document.getElementById('goalNameInput')?.value.trim() || '儲蓄目標';
            const newAmount = parseFloat(document.getElementById('goalAmountInput')?.value || 0);
            const newDate = document.getElementById('goalDateInput')?.value;
            
            if (isNaN(newAmount) || newAmount <= 0) {
                alert('請輸入有效的目標金額');
                return;
            }
            if (!newDate) {
                alert('請選擇目標日期');
                return;
            }
            
            savingsGoal.goalName = newName;
            savingsGoal.targetAmount = newAmount;
            savingsGoal.targetDate = newDate;
            saveGoalToStorage();
            
            modal.remove();
            if (planningPanel) {
                planningPanel.remove();
                planningPanel = null;
                createPlanningPanel();
            }
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }
    
    // ==================== 在側邊欄加入按鈕 ====================
    function addPlanningButton() {
        const checkInterval = setInterval(() => {
            const reportSection = document.querySelector('.report-shortcuts');
            if (reportSection && !document.getElementById('planningBtn')) {
                clearInterval(checkInterval);
                
                const planningBtn = document.createElement('button');
                planningBtn.id = 'planningBtn';
                planningBtn.className = 'report-btn';
                planningBtn.innerHTML = '📈 財務規劃室';
                planningBtn.style.background = 'linear-gradient(135deg, #2a7f49, #1e5a3a)';
                planningBtn.style.color = 'white';
                planningBtn.onclick = () => createPlanningPanel();
                
                reportSection.appendChild(planningBtn);
            }
        }, 100);
    }
    
    // ==================== 初始化 ====================
    function init() {
        loadGoalFromStorage();
        addPlanningButton();
        console.log('✅ 財務規劃模組已載入（預測圖表 + 儲蓄目標 + 儲蓄率趨勢）');
    }
    
    window.PlanningModule = {
        init: init,
        showPanel: createPlanningPanel,
        getSavingsRateHistory: calculateSavingsRateHistory,
        getCashFlowForecast: forecastCashFlow,
        getGoalProgress: calculateGoalProgress,
        setGoal: (goal) => { savingsGoal = { ...savingsGoal, ...goal }; saveGoalToStorage(); }
    };
    
    setTimeout(init, 800);
})();


</script>
</body>
</html>
